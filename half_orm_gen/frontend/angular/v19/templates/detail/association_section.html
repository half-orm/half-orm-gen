<div class="mt-4 bg-white rounded-lg shadow overflow-hidden">
  <div class="px-6 pt-5 pb-3 flex items-center justify-between">
    <a routerLink="/ho_bo/$target_rs/$target_rt" class="text-lg font-semibold hover:underline hover:text-blue-700">$target_title</a>
  </div>
  <div class="divide-y divide-gray-100">
    @for (row of $signal_name(); track row.target_pk) {
      <div class="px-6 py-2 flex items-center justify-between text-sm">
        <a [routerLink]="['/ho_bo/$target_rs/$target_rt', String(row.target_pk)]" class="text-blue-600 hover:underline font-mono">
          {{ row.target_label ?? row.target_pk }}
        </a>
        <span class="flex items-center gap-3 text-xs text-gray-400">
          @for (kv of objectEntries(row.extra); track kv[0]) {
            <span>{{ kv[0] }}: {{ kv[1] }}</span>
          }
        </span>
      </div>
    } @empty {
      <div class="px-6 py-3 text-sm text-gray-400">No related $target_title</div>
    }
  </div>
</div>
